# /etc/nginx/sites-available/amigosunite.org
#
# HOW TO APPLY ON VPS:
#   sudo cp amigosunite.org.nginx.conf /etc/nginx/sites-available/amigosunite.org
#   sudo nginx -t
#   sudo systemctl reload nginx

# ── Rate limiting zones (defined outside server blocks) ──────────────────────
# Limit by IP: 10 requests/second burst for the API, 30 req/s for the SPA.
# These complement Rack::Attack which runs inside Rails.
limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=10r/s;
limit_req_zone  $binary_remote_addr  zone=login_limit:10m rate=3r/m;
limit_req_zone  $binary_remote_addr  zone=web_limit:10m   rate=30r/s;

# Limit concurrent connections per IP
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
  server_name amigosunite.org www.amigosunite.org;

  listen 443 ssl;
  ssl_certificate     /etc/letsencrypt/live/amigosunite.org/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/amigosunite.org/privkey.pem;   # managed by Certbot
  include             /etc/letsencrypt/options-ssl-nginx.conf;              # managed by Certbot
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                   # managed by Certbot

  # ── Hardening ───────────────────────────────────────────────────────────────
  server_tokens off;                    # Don't advertise Nginx version
  client_max_body_size 10m;            # Reject oversized request bodies
  client_body_timeout 12s;
  client_header_timeout 12s;
  keepalive_timeout 15s;
  send_timeout 10s;

  # ── Security headers (applied to all responses) ──────────────────────────
  add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options     "nosniff"                             always;
  add_header X-Frame-Options            "DENY"                                always;
  add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
  add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;

  # ── Block scanners probing for common vulnerabilities ────────────────────
  location ~* ^/(wp-admin|wp-login|wp-content|xmlrpc\.php|\.env|\.git|phpmyadmin|pma|cgi-bin|actuator|console) {
    deny all;
    return 404;
  }

  # ── Let's Encrypt renewal (no rate limiting needed here) ─────────────────
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
    try_files $uri =404;
  }

  # ── API ──────────────────────────────────────────────────────────────────
  location ^~ /api/ {
    # Tighter rate limit on the API; burst=20 lets a page load fire several
    # requests at once without being blocked, nodelay serves them immediately.
    limit_req  zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 20;

    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ── Extra-tight limit on login/signup specifically ───────────────────────
  location = /api/v1/login {
    limit_req  zone=login_limit burst=5 nodelay;
    limit_conn conn_limit 10;

    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location = /api/v1/signup {
    limit_req  zone=login_limit burst=3 nodelay;
    limit_conn conn_limit 10;

    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Active Storage (blobs, variants, previews) ───────────────────────────
  # These URLs are generated by Rails and must be proxied to the API, not the
  # SPA. Without this block Nginx routes them to the frontend (port 8080) → 404.
  location ^~ /rails/active_storage/ {
    limit_req  zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 20;

    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ── SPA ──────────────────────────────────────────────────────────────────
  location / {
    limit_req  zone=web_limit burst=50 nodelay;
    limit_conn conn_limit 30;

    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
  listen      80;
  server_name amigosunite.org www.amigosunite.org;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}
